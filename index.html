<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsentVault - Track Your Digital Consent</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <!-- Dashboard Stats -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="total-consents">0</div>
                <div class="stat-label">Total Consents</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-number" id="dark-patterns-count">0</div>
                <div class="stat-label">Dark Patterns</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-number" id="avg-risk-score">0</div>
                    <div class="stat-label">Avg Risk Score</div>
                </div>
                <div class="stat-card alert">
                    <div class="stat-number" id="high-risk-count">0</div>
                    <div class="stat-label">High Risk</div>
                </div>
                </section>
